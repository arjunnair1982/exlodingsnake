<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — 2 Players</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --border: #2a2a32;
    --text: #e8e8ec;
    --muted: #6b6b78;
    --s1: #c8ff00;
    --s2: #60a5fa;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1.5rem 1rem;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 10% 10%, rgba(200,255,0,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 90% 90%, rgba(96,165,250,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  header { display: flex; align-items: baseline; gap: 1rem; }
  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -0.02em;
    color: var(--text);
  }
  h1 span:nth-child(1) { color: var(--s1); }
  h1 span:nth-child(2) { color: var(--muted); }
  h1 span:nth-child(3) { color: var(--s2); }
  .tagline { font-size: 11px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

  .scoreboards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: 100%;
    max-width: 480px;
  }

  .scoreboard {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .sb-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .sb-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: background 0.4s;
  }

  .sb-stats { display: flex; justify-content: space-between; }
  .sb-stat { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .sb-label { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .sb-val { font-size: 15px; font-weight: 700; }

  .lives-pips { display: flex; gap: 4px; }
  .pip {
    width: 7px; height: 7px; border-radius: 50%;
    transition: background 0.3s, transform 0.3s;
  }
  .pip.dead { background: var(--border) !important; transform: scale(0.65); }

  #arena-wrap {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  #arena-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 2;
    border-radius: 4px;
  }

  #canvas { display: block; cursor: pointer; }

  #overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0.8rem;
    background: rgba(13,13,15,0.88);
    backdrop-filter: blur(5px);
    z-index: 10; opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  #overlay.show { opacity: 1; pointer-events: all; }
  #overlay-title {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 2.2rem; letter-spacing: -0.02em;
  }
  #overlay-winner { font-size: 13px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  #overlay-scores { font-size: 13px; color: var(--text); display: flex; gap: 2rem; }
  #restart-btn {
    margin-top: 0.4rem; padding: 0.55rem 1.8rem;
    background: var(--text); color: #0d0d0f;
    border: none; border-radius: 3px;
    font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  #restart-btn:hover { opacity: 0.85; transform: scale(1.03); }
  #restart-btn:active { transform: scale(0.97); }

  footer {
    font-size: 11px; color: var(--muted);
    letter-spacing: 0.05em; text-align: center; line-height: 1.8;
  }
  footer .p1c { color: var(--s1); }
  footer .p2c { color: var(--s2); }
  kbd {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 3px; padding: 1px 5px;
    font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text);
  }
</style>
</head>
<body>

<header>
  <h1><span>SNAKE</span><span> × </span><span>SNAKE</span></h1>
  <span class="tagline">2 players</span>
</header>

<div class="scoreboards">
  <div class="scoreboard" id="sb1">
    <div class="sb-header">
      <div class="sb-dot" id="dot1"></div>
      <span>Player 1 · WASD</span>
    </div>
    <div class="sb-stats">
      <div class="sb-stat"><span class="sb-label">Score</span><span class="sb-val" id="score1">0</span></div>
      <div class="sb-stat"><span class="sb-label">Len</span><span class="sb-val" id="len1">3</span></div>
      <div class="sb-stat">
        <span class="sb-label">Lives</span>
        <div class="lives-pips">
          <div class="pip" id="p1a"></div><div class="pip" id="p1b"></div><div class="pip" id="p1c"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="scoreboard" id="sb2">
    <div class="sb-header">
      <div class="sb-dot" id="dot2"></div>
      <span>Player 2 · Arrows</span>
    </div>
    <div class="sb-stats">
      <div class="sb-stat"><span class="sb-label">Score</span><span class="sb-val" id="score2">0</span></div>
      <div class="sb-stat"><span class="sb-label">Len</span><span class="sb-val" id="len2">3</span></div>
      <div class="sb-stat">
        <span class="sb-label">Lives</span>
        <div class="lives-pips">
          <div class="pip" id="p2a"></div><div class="pip" id="p2b"></div><div class="pip" id="p2c"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="arena-wrap">
  <canvas id="canvas" width="480" height="480"></canvas>
  <div id="overlay">
    <div id="overlay-title">GAME OVER</div>
    <div id="overlay-winner"></div>
    <div id="overlay-scores"></div>
    <button id="restart-btn">Play Again</button>
  </div>
</div>

<footer>
  <span class="p1c">P1: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></span>
  &nbsp;·&nbsp;
  <span class="p2c">P2: <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd></span>
  &nbsp;·&nbsp; Click a snake to explode it
</footer>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayWinner = document.getElementById('overlay-winner');
const overlayScores = document.getElementById('overlay-scores');
document.getElementById('restart-btn').addEventListener('click', () => { initGame(); startAppleTimer(); });

const COLS = 24, ROWS = 24, CELL = 20;

const COLOR_POOLS = [
  ['#c8ff00','#facc15','#fb923c','#34d399','#4ade80'],  // p1 warm/green
  ['#60a5fa','#a78bfa','#f472b6','#e879f9','#38bdf8'],  // p2 cool/purple
];

let state, appleTimer;

function rndColorFor(idx) {
  const pool = COLOR_POOLS[idx];
  const cur = state.snakes[idx].color;
  const opts = pool.filter(c => c !== cur);
  return opts[Math.floor(Math.random() * opts.length)];
}

function makePips(ids, lives) {
  ids.forEach((id, i) => {
    const el = document.getElementById(id);
    el.classList.toggle('dead', i >= lives);
  });
}

function updateHud() {
  state.snakes.forEach((sn, i) => {
    const n = i + 1;
    document.getElementById('score' + n).textContent = sn.score;
    document.getElementById('len' + n).textContent = sn.body.length;
    document.getElementById('dot' + n).style.background = sn.color;
    const pipIds = i === 0 ? ['p1a','p1b','p1c'] : ['p2a','p2b','p2c'];
    makePips(pipIds, sn.lives);
  });
}

function initSnake(idx) {
  const starts = [
    [{x:6,y:12},{x:5,y:12},{x:4,y:12}],
    [{x:18,y:12},{x:19,y:12},{x:20,y:12}],
  ];
  const dirs = [{x:1,y:0},{x:-1,y:0}];
  return {
    body: starts[idx].map(p => ({...p})),
    dir: {...dirs[idx]},
    nextDir: {...dirs[idx]},
    color: COLOR_POOLS[idx][0],
    score: 0,
    lives: 3,
    exploding: false,
    dead: false,
  };
}

function initGame() {
  clearInterval(appleTimer);
  state = {
    snakes: [initSnake(0), initSnake(1)],
    apples: [],
    particles: [],
    gameOver: false,
  };
  spawnApples(4);
  updateHud();
  overlay.classList.remove('show');
}

function spawnApple() {
  let pos, tries = 0;
  const occupied = [
    ...state.snakes.flatMap(sn => sn.body),
    ...state.apples,
  ];
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    tries++;
  } while (tries < 150 && occupied.some(o => o.x===pos.x && o.y===pos.y));
  state.apples.push({...pos, born: performance.now()});
}

function spawnApples(n) { for(let i=0;i<n;i++) spawnApple(); }

function startAppleTimer() {
  clearInterval(appleTimer);
  appleTimer = setInterval(() => {
    if (!state.gameOver && state.apples.length < 10) spawnApple();
  }, 2000);
}

function doExplode(idx) {
  const sn = state.snakes[idx];
  sn.exploding = true;
  sn.body.forEach(seg => {
    for (let i = 0; i < 6; i++) {
      const angle = Math.random() * Math.PI * 2;
      const spd = 2 + Math.random() * 5;
      state.particles.push({
        x: seg.x * CELL + CELL/2 + (Math.random()-0.5)*CELL,
        y: seg.y * CELL + CELL/2 + (Math.random()-0.5)*CELL,
        vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
        life: 1, decay: 0.025 + Math.random()*0.02,
        color: sn.color, r: 3 + Math.random()*5,
        shape: Math.random() > 0.5 ? 'circle' : 'square',
      });
    }
  });

  const newColor = rndColorFor(idx);
  setTimeout(() => {
    sn.color = newColor;
    const fresh = initSnake(idx);
    sn.body = fresh.body;
    sn.dir = fresh.dir;
    sn.nextDir = fresh.nextDir;
    sn.exploding = false;
    document.getElementById('dot' + (idx+1)).style.background = newColor;
    checkGameOver();
    updateHud();
  }, 500);
}

function checkGameOver() {
  const allDead = state.snakes.every(sn => sn.lives <= 0);
  if (!allDead) return;
  state.gameOver = true;
  const [s1, s2] = state.snakes;
  let winner, winColor;
  if (s1.score > s2.score) { winner = 'Player 1 wins!'; winColor = s1.color; }
  else if (s2.score > s1.score) { winner = 'Player 2 wins!'; winColor = s2.color; }
  else { winner = 'It\'s a draw!'; winColor = '#e8e8ec'; }
  overlayTitle.style.color = winColor;
  overlayWinner.textContent = winner;
  overlayScores.innerHTML =
    `<span style="color:${s1.color}">P1: ${s1.score}</span>` +
    `<span style="color:${s2.color}">P2: ${s2.score}</span>`;
  overlay.classList.add('show');
}

function getSnakeIdxAt(px, py) {
  const gx = Math.floor(px / CELL), gy = Math.floor(py / CELL);
  for (let i = 0; i < 2; i++) {
    if (state.snakes[i].body.some(s => s.x===gx && s.y===gy)) return i;
  }
  return -1;
}

canvas.addEventListener('click', e => {
  if (state.gameOver) return;
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (canvas.width / rect.width);
  const py = (e.clientY - rect.top) * (canvas.height / rect.height);
  const idx = getSnakeIdxAt(px, py);
  if (idx !== -1 && !state.snakes[idx].exploding) {
    state.snakes[idx].lives = Math.max(0, state.snakes[idx].lives - 1);
    doExplode(idx);
    updateHud();
  }
});

const KEY_MAP = {
  w:{p:0,d:{x:0,y:-1}}, s:{p:0,d:{x:0,y:1}}, a:{p:0,d:{x:-1,y:0}}, d:{p:0,d:{x:1,y:0}},
  W:{p:0,d:{x:0,y:-1}}, S:{p:0,d:{x:0,y:1}}, A:{p:0,d:{x:-1,y:0}}, D:{p:0,d:{x:1,y:0}},
  ArrowUp:{p:1,d:{x:0,y:-1}}, ArrowDown:{p:1,d:{x:0,y:1}},
  ArrowLeft:{p:1,d:{x:-1,y:0}}, ArrowRight:{p:1,d:{x:1,y:0}},
};

document.addEventListener('keydown', e => {
  if (state.gameOver) return;
  const m = KEY_MAP[e.key];
  if (!m) return;
  e.preventDefault();
  const sn = state.snakes[m.p];
  if (!(m.d.x === -sn.dir.x && m.d.y === -sn.dir.y)) sn.nextDir = m.d;
});

function moveSnake(idx) {
  const sn = state.snakes[idx];
  if (sn.exploding || sn.lives <= 0) return;
  sn.dir = sn.nextDir;
  const head = {x: sn.body[0].x + sn.dir.x, y: sn.body[0].y + sn.dir.y};

  const otherBody = state.snakes[1 - idx].body;
  const hitWall = head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS;
  const hitSelf = sn.body.some(s => s.x===head.x && s.y===head.y);
  const hitOther = !state.snakes[1-idx].exploding && otherBody.some(s => s.x===head.x && s.y===head.y);

  if (hitWall || hitSelf || hitOther) {
    sn.lives = Math.max(0, sn.lives - 1);
    doExplode(idx);
    return;
  }

  sn.body.unshift(head);
  const ateIdx = state.apples.findIndex(a => a.x===head.x && a.y===head.y);
  if (ateIdx !== -1) {
    sn.score += 10;
    state.apples.splice(ateIdx, 1);
  } else {
    sn.body.pop();
  }
}

function updateParticles() {
  state.particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.18; p.vx *= 0.98;
    p.life -= p.decay;
  });
  state.particles = state.particles.filter(p => p.life > 0);
}

function hexToRgb(hex) {
  return [1,3,5].map(i => parseInt(hex.slice(i,i+2),16)).join(',');
}

function drawSnake(sn) {
  if (sn.exploding && state.particles.length > 15) return;
  const rgb = hexToRgb(sn.color);
  sn.body.forEach((seg, i) => {
    const t = i / Math.max(sn.body.length - 1, 1);
    ctx.globalAlpha = 1 - t * 0.55;
    if (i === 0) { ctx.shadowColor = sn.color; ctx.shadowBlur = 14; }
    ctx.fillStyle = i === 0 ? sn.color : `rgba(${rgb},${0.9 - t*0.4})`;
    const pad = i === 0 ? 1 : 2, rad = i === 0 ? 5 : 3;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, rad);
    ctx.fill();
    ctx.shadowBlur = 0;
    if (i === 0) {
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#000';
      const ex = sn.dir.x, ey = sn.dir.y;
      const cx = seg.x*CELL+CELL/2, cy = seg.y*CELL+CELL/2;
      ctx.beginPath(); ctx.arc(cx+ex*4+ey*3, cy+ey*4+ex*3, 2.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx+ex*4-ey*3, cy+ey*4-ex*3, 2.2, 0, Math.PI*2); ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

function draw(ts) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#0d0d0f';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = '#1a1a20'; ctx.lineWidth = 0.5;
  for (let x=0;x<=COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke(); }
  for (let y=0;y<=ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke(); }

  const now = ts || performance.now();
  state.apples.forEach(a => {
    const pulse = 0.85 + Math.sin((now - a.born)/333) * 0.15;
    ctx.fillStyle = '#ef4444'; ctx.shadowColor = '#ef4444'; ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(a.x*CELL+CELL/2, a.y*CELL+CELL/2, (CELL/2-2)*pulse, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(a.x*CELL+CELL/2-1, a.y*CELL+2, 2, 4);
  });

  state.snakes.forEach((sn, i) => drawSnake(sn));

  state.particles.forEach(p => {
    ctx.globalAlpha = p.life * p.life;
    ctx.fillStyle = p.color; ctx.shadowColor = p.color; ctx.shadowBlur = 6;
    if (p.shape === 'square') {
      const s = p.r * p.life * 1.8;
      ctx.fillRect(p.x-s/2, p.y-s/2, s, s);
    } else {
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r*p.life, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;
}

let last = 0;
const TICK = 120;

function loop(ts) {
  requestAnimationFrame(loop);
  updateParticles();
  if (!state.gameOver && ts - last > TICK) {
    last = ts;
    moveSnake(0);
    moveSnake(1);
    updateHud();
  }
  draw(ts);
}

initGame();
startAppleTimer();
requestAnimationFrame(loop);
</script>
</body>
</html>
