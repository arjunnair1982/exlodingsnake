<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #141418;
    --border: #2a2a32;
    --text: #e8e8ec;
    --muted: #6b6b78;
    --accent: #c8ff00;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem 1rem;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(200,255,0,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 90%, rgba(96,165,250,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(1.8rem, 5vw, 2.8rem);
    letter-spacing: -0.02em;
    color: var(--accent);
  }

  .tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .hud {
    display: flex;
    gap: 2rem;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .hud-val {
    color: var(--text);
    font-weight: 700;
    font-size: 14px;
  }

  .hud-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }

  .lives-pips { display: flex; gap: 5px; margin-top: 2px; }
  .pip {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    transition: background 0.3s, transform 0.3s;
  }
  .pip.dead { background: var(--border); transform: scale(0.7); }

  #arena-wrap {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  #arena-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 4px;
    box-shadow: inset 0 0 40px rgba(0,0,0,0.6);
    pointer-events: none;
    z-index: 2;
  }

  #canvas {
    display: block;
    cursor: pointer;
  }

  #overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    background: rgba(13,13,15,0.85);
    backdrop-filter: blur(4px);
    z-index: 10;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  #overlay.show { opacity: 1; pointer-events: all; }

  #overlay-title {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2.4rem;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  #overlay-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #overlay-score {
    font-size: 14px;
    color: var(--text);
  }

  #restart-btn {
    margin-top: 0.5rem;
    padding: 0.6rem 2rem;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    border-radius: 3px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }

  #restart-btn:hover { opacity: 0.85; transform: scale(1.03); }
  #restart-btn:active { transform: scale(0.97); }

  footer {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-align: center;
  }

  kbd {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--text);
  }
</style>
</head>
<body>

<header>
  <h1>SNAKE</h1>
  <span class="tagline">click to explode</span>
</header>

<div class="hud">
  <div class="hud-item">
    <span>Score</span>
    <span class="hud-val" id="score">0</span>
  </div>
  <div class="hud-item">
    <span>Length</span>
    <span class="hud-val" id="length">3</span>
  </div>
  <div class="hud-item">
    <span>Lives</span>
    <div class="lives-pips" id="pips">
      <div class="pip" id="pip1"></div>
      <div class="pip" id="pip2"></div>
      <div class="pip" id="pip3"></div>
    </div>
  </div>
</div>

<div id="arena-wrap">
  <canvas id="canvas" width="480" height="480"></canvas>
  <div id="overlay">
    <div id="overlay-title">GAME OVER</div>
    <div id="overlay-score"></div>
    <div id="overlay-sub">You ran out of lives</div>
    <button id="restart-btn">Play Again</button>
  </div>
</div>

<footer>
  <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> or <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> to move &nbsp;·&nbsp; Click the snake to explode it
</footer>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('score');
const lengthEl = document.getElementById('length');
const overlayScore = document.getElementById('overlay-score');
document.getElementById('restart-btn').addEventListener('click', () => { initGame(); startAppleTimer(); });

const COLS = 24, ROWS = 24, CELL = 20;

const SNAKE_COLORS = [
  '#c8ff00','#60a5fa','#f472b6','#fb923c','#a78bfa',
  '#34d399','#f87171','#facc15','#38bdf8','#e879f9'
];

let state, appleTimer;

function rndColor() {
  const opts = SNAKE_COLORS.filter(c => c !== state.snakeColor);
  return opts[Math.floor(Math.random() * opts.length)];
}

function initGame() {
  clearInterval(appleTimer);
  state = {
    snake: [{x:12,y:12},{x:11,y:12},{x:10,y:12}],
    dir: {x:1,y:0},
    nextDir: {x:1,y:0},
    apples: [],
    score: 0,
    lives: 3,
    snakeColor: SNAKE_COLORS[0],
    particles: [],
    gameOver: false,
    exploding: false,
  };
  spawnApples(3);
  updateHud();
  overlay.classList.remove('show');
}

function spawnApple() {
  let pos, tries = 0;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
    tries++;
  } while (tries < 150 && (
    state.snake.some(s => s.x===pos.x && s.y===pos.y) ||
    state.apples.some(a => a.x===pos.x && a.y===pos.y)
  ));
  state.apples.push({...pos, born: performance.now()});
}

function spawnApples(n) { for(let i=0;i<n;i++) spawnApple(); }

function startAppleTimer() {
  clearInterval(appleTimer);
  appleTimer = setInterval(() => {
    if (!state.gameOver && !state.exploding && state.apples.length < 10) spawnApple();
  }, 2000);
}

function updateHud() {
  scoreEl.textContent = state.score;
  lengthEl.textContent = state.snake.length;
  [1,2,3].forEach(i => {
    document.getElementById('pip'+i).classList.toggle('dead', i > state.lives);
  });
}

function doExplode() {
  state.exploding = true;
  const head = state.snake[0];
  for (let i = 0; i < 40; i++) {
    const seg = state.snake[Math.floor(Math.random() * state.snake.length)];
    const angle = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    state.particles.push({
      x: seg.x * CELL + CELL/2 + (Math.random()-0.5)*CELL,
      y: seg.y * CELL + CELL/2 + (Math.random()-0.5)*CELL,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.025 + Math.random()*0.02,
      color: state.snakeColor,
      r: 3 + Math.random() * 5,
      shape: Math.random() > 0.5 ? 'circle' : 'square',
    });
  }
  const newColor = rndColor();
  setTimeout(() => {
    state.snakeColor = newColor;
    state.snake = [{x:12,y:12},{x:11,y:12},{x:10,y:12}];
    state.dir = {x:1,y:0};
    state.nextDir = {x:1,y:0};
    state.exploding = false;
    if (state.lives <= 0) {
      state.gameOver = true;
      overlayScore.textContent = `Final score: ${state.score}`;
      overlay.classList.add('show');
    }
    updateHud();
  }, 500);
}

function getSnakeAt(px, py) {
  const gx = Math.floor(px / CELL);
  const gy = Math.floor(py / CELL);
  return state.snake.some(s => s.x===gx && s.y===gy);
}

canvas.addEventListener('click', e => {
  if (state.gameOver || state.exploding) return;
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (canvas.width / rect.width);
  const py = (e.clientY - rect.top) * (canvas.height / rect.height);
  if (getSnakeAt(px, py)) {
    state.lives = Math.max(0, state.lives - 1);
    doExplode();
  }
});

document.addEventListener('keydown', e => {
  if (state.gameOver) return;
  const map = {
    ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
    w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
    W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0},
  };
  const nd = map[e.key];
  if (nd) {
    if (!(nd.x === -state.dir.x && nd.y === -state.dir.y)) state.nextDir = nd;
    e.preventDefault();
  }
});

function move() {
  if (state.exploding) return;
  state.dir = state.nextDir;
  const head = {x: state.snake[0].x + state.dir.x, y: state.snake[0].y + state.dir.y};
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      state.snake.some(s => s.x===head.x && s.y===head.y)) {
    state.lives = Math.max(0, state.lives - 1);
    doExplode();
    return;
  }
  state.snake.unshift(head);
  const ateIdx = state.apples.findIndex(a => a.x===head.x && a.y===head.y);
  if (ateIdx !== -1) {
    state.score += 10;
    state.apples.splice(ateIdx, 1);
  } else {
    state.snake.pop();
  }
  updateHud();
}

function updateParticles() {
  state.particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.18;
    p.vx *= 0.98;
    p.life -= p.decay;
  });
  state.particles = state.particles.filter(p => p.life > 0);
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function draw(ts) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Background
  ctx.fillStyle = '#0d0d0f';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Grid
  ctx.strokeStyle = '#1a1a20';
  ctx.lineWidth = 0.5;
  for (let x=0; x<=COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,canvas.height); ctx.stroke();
  }
  for (let y=0; y<=ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(canvas.width,y*CELL); ctx.stroke();
  }

  // Apples
  const now = ts || performance.now();
  state.apples.forEach(a => {
    const age = (now - a.born) / 1000;
    const pulse = 0.85 + Math.sin(age * 3) * 0.15;
    const r = (CELL/2 - 2) * pulse;
    ctx.fillStyle = '#ef4444';
    ctx.shadowColor = '#ef4444';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(a.x*CELL+CELL/2, a.y*CELL+CELL/2, r, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
    // stem
    ctx.fillStyle = '#4ade80';
    ctx.fillRect(a.x*CELL+CELL/2-1, a.y*CELL+2, 2, 4);
  });

  // Snake
  if (!state.exploding || state.particles.length < 20) {
    const rgb = hexToRgb(state.snakeColor);
    state.snake.forEach((seg, i) => {
      const t = i / Math.max(state.snake.length - 1, 1);
      ctx.globalAlpha = 1 - t * 0.55;

      if (i === 0) {
        ctx.shadowColor = state.snakeColor;
        ctx.shadowBlur = 12;
      }

      ctx.fillStyle = i === 0
        ? state.snakeColor
        : `rgba(${rgb}, ${0.9 - t*0.4})`;

      const pad = i === 0 ? 1 : 2;
      const rad = i === 0 ? 5 : 3;
      ctx.beginPath();
      ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, rad);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (i === 0) {
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#000';
        const ex = state.dir.x, ey = state.dir.y;
        const cx = seg.x*CELL+CELL/2, cy = seg.y*CELL+CELL/2;
        ctx.beginPath(); ctx.arc(cx+ex*4+ey*3, cy+ey*4+ex*3, 2.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx+ex*4-ey*3, cy+ey*4-ex*3, 2.2, 0, Math.PI*2); ctx.fill();
      }
    });
    ctx.globalAlpha = 1;
  }

  // Particles
  state.particles.forEach(p => {
    ctx.globalAlpha = p.life * p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    if (p.shape === 'square') {
      const s = p.r * p.life * 1.8;
      ctx.fillRect(p.x - s/2, p.y - s/2, s, s);
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;
}

let last = 0;
const TICK = 115;

function loop(ts) {
  requestAnimationFrame(loop);
  updateParticles();
  if (!state.gameOver && ts - last > TICK) {
    last = ts;
    move();
  }
  draw(ts);
}

initGame();
startAppleTimer();
requestAnimationFrame(loop);
</script>
</body>
</html>
